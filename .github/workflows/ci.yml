name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --testPathPattern=unit

      - name: Run integration tests
        run: npm run test -- --testPathPattern=integration

      - name: Run e2e tests
        run: npm run test -- --testPathPattern=e2e
