name: Application Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Mise en cache des modules npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Installation des dépendances
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: Exécution des tests
        run: npm test

      - name: Publication du rapport JUnit
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: junit.xml

      - name: Vérification des secrets et variables
        env:
          APP_ENV: ${{ vars.APP_ENVIRONMENT }}
          AWS_KEY: ${{ secrets.AWS_SECRET_KEY }}
        run: |
          echo "Environnement : $APP_ENV"
          echo "Clé AWS : $AWS_KEY"
